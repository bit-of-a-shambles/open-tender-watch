    methodology:
      heading: "Methodology"
      subheading: "How risk scores are determined and what each flag means"
      approach_p1: "Risk indicators follow the OECD framework for detecting corruption and collusion in public procurement. Each flag is independently scored and assigned a confidence level — the score degrades when key fields (NIF, CPV, price, dates) are missing."
      approach_p2: "The system surfaces cases for audit and journalistic review. It does not produce conclusions. All outputs should be treated as leads, not findings."
      track_b_note: "Track B flags require sufficient data volume (≥ 2 years) and are not yet active."
      disclaimer: "Risk scores reflect structural anomalies in procurement data. Missing or inconsistent data is itself a risk signal — it can indicate evasion. Absence of a flag does not mean a contract is clean."
      flags:
        a1_title: "Repeat direct awards"
        a1_desc: "Same authority repeatedly awards directly to the same supplier within 36 months"
        a2_title: "Publication after celebration"
        a2_desc: "Contract published in BASE after the signing date"
        a3_title: "Execution before publication"
        a3_desc: "Execution starts before the contract is published"
        a4_title: "Amendment inflation"
        a4_desc: "Large or frequent contract modifications inflating the original value"
        a5_title: "Threshold splitting"
        a5_desc: "Contract value just below the procedural thresholds (€5K / €20K / €75K / €150K)"
        a6_title: "Single bidder"
        a6_desc: "Only one bidder participated in a competitive procedure"
        a7_title: "Abnormal direct-award rate"
        a7_desc: "Authority uses direct award far above peer median for the same CPV"
        a8_title: "Long execution"
        a8_desc: "Execution duration exceeds 3 years"
        a9_title: "Price anomaly"
        a9_desc: "Final effective price deviates significantly from the base estimate"
        b1_title: "Bid rotation"
        b1_desc: "Suppliers rarely compete except with one authority (graph analysis)"
        b2_title: "Supplier concentration"
        b2_desc: "Herfindahl-style concentration index — one supplier dominates an authority's spend"
        b3_title: "Unusual pricing"
        b3_desc: "Price z-score outlier within CPV × region × year peer group"
        b4_title: "Procedural shift"
        b4_desc: "Sudden change in procedure type distribution near budget deadlines"
        c1_title: "Missing supplier NIF"
        c1_desc: "Supplier tax identifier absent or invalid — OECD data completeness signal"
        c2_title: "Impossible date sequence"
        c2_desc: "Date fields out of order or outside plausible ranges"
        c3_title: "Missing mandatory fields"
        c3_desc: "CPV, location, or base price absent for the procedure type"
        c4_title: "AdC sanction overlap"
        c4_desc: "Supplier NIF matches a Competition Authority cartel case"
        c5_title: "Entity name variation"
        c5_desc: "Same NIF appears under multiple name variants — potential obfuscation"

